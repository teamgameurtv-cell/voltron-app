name: voltron_app
description: Application mobile Voltron - vente, réparation et entretien de trottinettes électriques
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  supabase_flutter: ^2.5.6
  file_picker: ^8.1.2
  url_launcher: ^6.3.2
  qr_flutter: ^4.1.0
  csv: ^6.0.0
  # À activer aux sprints suivants (backend réel) :
  # firebase_core: ^3.1.0
  # firebase_messaging: ^15.0.0
  # flutter_stripe: ^10.1.1
  # google_maps_flutter: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  image: ^4.2.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
